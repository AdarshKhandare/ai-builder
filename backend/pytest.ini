[pytest]
# Run every async test function as an asyncio test without per-test
# @pytest.mark.asyncio decorators. Requires pytest-asyncio >= 0.21.
asyncio_mode = auto

# Only collect tests from the backend tests package. Avoids accidentally
# picking up unrelated test_*.py files in sibling directories.
testpaths = tests

# Quiet down a couple of harmless warnings so the test output is readable.
filterwarnings =
    ignore::DeprecationWarning:httpx.*
    ignore::DeprecationWarning:pydantic.*
