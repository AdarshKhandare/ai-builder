# =============================================================================
# Nginx server block for Forge AI Web-Builder backend API
# =============================================================================
#
# Domain:    api.ai-builder.adarshweb.in
# Proxies to: 127.0.0.1:8000 (Docker container)
#
# INSTALLATION:
#   sudo cp /opt/ai-builder/deploy/nginx/api.ai-builder.adarshweb.in.conf \
#       /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/api.ai-builder.adarshweb.in.conf \
#       /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# AFTER CERTBOT (SSL):
#   sudo certbot --nginx -d api.ai-builder.adarshweb.in
#   Certbot will auto-modify this file to add SSL directives and HTTP→HTTPS redirect.
#
# SSE/STREAMING NOTES:
#   - proxy_buffering off: streams tokens in real-time (no buffering)
#   - proxy_read_timeout 300s: AI generation can take 30s-2min
#   - proxy_http_version 1.1: enables keepalive for long-lived connections
#   - Backend sends :keepalive\n\n every 15s to prevent idle timeouts
#
# =============================================================================

# ── HTTP server (port 80) ────────────────────────────────────────────────────
# After Certbot runs, this block will be modified to redirect to HTTPS.
# Before SSL is set up, this serves traffic directly.

server {
    listen 80;
    listen [::]:80;
    server_name api.ai-builder.adarshweb.in;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Health check endpoint (no proxy — optional, for Nginx monitoring) ─
    # location = /nginx-health {
    #     return 200 "ok\n";
    #     add_header Content-Type text/plain;
    # }

    # ── Proxy all requests to the backend container ───────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;

        # ── Standard proxy headers ────────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── SSE / Streaming support (CRITICAL for AI generation) ──────────
        #
        # proxy_buffering off:
        #   Default is ON. With buffering, Nginx waits for the full response
        #   before sending to the client. SSE needs real-time token streaming.
        #   The backend also sets X-Accel-Buffering: no as a belt-and-suspenders.
        proxy_buffering off;

        # proxy_cache off:
        #   Never cache streaming AI responses.
        proxy_cache off;

        # proxy_read_timeout 300s:
        #   Default is 60s. AI generation streams can take 30s-2min.
        #   This is the timeout between successive reads from the upstream.
        #   300s (5 min) gives ample headroom.
        proxy_read_timeout 300s;

        # proxy_send_timeout 300s:
        #   Timeout between successive writes to the upstream.
        proxy_send_timeout 300s;

        # proxy_connect_timeout 10s:
        #   Time to establish the initial connection to the upstream.
        proxy_connect_timeout 10s;

        # ── HTTP/1.1 for keepalive ────────────────────────────────────────
        #
        # proxy_http_version 1.1:
        #   Default was 1.0 before Nginx 1.29.7. HTTP/1.1 supports keepalive
        #   connections, which are essential for long-lived SSE streams.
        proxy_http_version 1.1;

        # Connection header:
        #   For SSE (not WebSocket), set Connection to "" (empty) to enable
        #   keepalive. For WebSocket, it would be "upgrade".
        #   Since this API uses SSE (not WebSocket), we use empty string.
        proxy_set_header Connection "";

        # ── Request body handling ─────────────────────────────────────────
        # Allow larger request bodies if needed (e.g., for large prompts
        # or code snippets sent to the generate endpoint).
        client_max_body_size 10m;
    }

    # ── Deny access to hidden files ───────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

