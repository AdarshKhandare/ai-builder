services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: forge-api:latest
    container_name: forge-api
    # NOTE: No `ports` here — Docker Compose merges (not replaces) port lists
    # from override files. Port bindings are defined per-environment:
    #   Local dev:   docker compose -f docker-compose.yml -f docker-compose.local.yml up
    #   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up
    # Create this from backend/.env.example: cp backend/.env.example backend/.env
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL so the SQLite file lives inside the
      # mounted volume at /app/data, not at the image-level ./data path.
      DATABASE_URL: sqlite+aiosqlite:///./data/forge.db
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
